services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: drawdoc
      POSTGRES_PASSWORD: drawdoc
      POSTGRES_DB: drawdoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawdoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ws
    ports:
      - "1234:1234"
    environment:
      WS_REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
