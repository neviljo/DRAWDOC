services:
  - type: web
    name: drawdoc-api
    runtime: docker
    dockerfilePath: infra/Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drawdoc-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: https://drawdoc.vercel.app
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  - type: web
    name: drawdoc-ws
    runtime: docker
    dockerfilePath: infra/Dockerfile.ws
    envVars:
      - key: WS_REDIS_URL
        sync: false

  - type: web
    name: drawdoc-agent
    runtime: docker
    dockerfilePath: infra/Dockerfile.agent
    envVars:
      - key: AGENT_DATABASE_URL
        fromDatabase:
          name: drawdoc-db
          property: connectionString
      - key: AGENT_REDIS_URL
        sync: false
      - key: AGENT_CORS_ORIGINS
        value: https://drawdoc.vercel.app
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

databases:
  - name: drawdoc-db
    plan: free
    postgresMajorVersion: 15
